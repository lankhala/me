<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khala Task Manager - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> <!-- Default គឺ Light Mode -->
    <div class="app-container">
        <!-- Theme Toggle & Header -->
        <header class="app-header">
            <div class="theme-switch-wrapper">
                <button id="themeToggle" class="btn-theme">Change Theme</button>
            </div>
            <div class="header-logo">
                <p style="font-size: 30px;">ប្រព័ន្ធគ្រប់គ្រងការងារ</p>
                <p>រៀបចំការងារឱ្យមានសណ្តាប់ធ្នាប់ និងកាត់បន្ថយ Stress</p>
            </div>
        </header>

        <nav class="app-nav">
            <button class="nav-btn active" data-view="home">Home</button>
            <button class="nav-btn" data-view="history">History</button>
        </nav>

        <main class="main-content">
            <section id="homeView" class="view-section active">
                <div class="input-container">
                    <p>បង្កើតក្រុមការងារថ្មី</p>
                    <form id="taskForm" class="task-form">
                        <div class="input-group">
                            <input type="text" id="taskTitle" placeholder="ឈ្មោះក្រុម ឬ ឈ្មោះការងារ..." required>
                            <input type="text" id="taskDesc" placeholder="ពណ៌នាលម្អិតខ្លីៗ...">
                        </div>
                        <button type="submit" class="btn-add">បង្កើតការងារ</button>
                    </form>
                </div>

                <div class="board-wrapper" id="boardWrapper">
                    <div class="task-board" id="taskBoard">
                        <!-- Columns generated by JS -->
                    </div>
                </div>
            </section>

            <section id="historyView" class="view-section">
                <div class="history-card">
                    <div class="history-header">
                        <p>ប្រវត្តិការងារដែលបានបញ្ចប់</p>
                        <button onclick="clearHistory()" class="btn-clear">សម្អាតប្រវត្តិ</button>
                    </div>
                    <div id="historyList" class="history-list"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
