<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Manager - Money & Time</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
<div class="app-container">
    <header>
        <span id="header-title">កាបូបលុយរបស់ខ្ញុំ</span>
        <div class="balance-display" id="main-stat">$ 0.00</div>
    </header>
    <center>
        <main>
        <div id="finance-page" class="page active-page">
            <div class="input-card">
                <input type="text" id="fin-desc" placeholder="ប្រតិបត្តការរបស់អ្នក">
                <input type="number" id="fin-amount" placeholder="ចំនួនទឹកប្រាក់ ($)">
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn btn-add" onclick="saveTransaction('in')">ចំណូល</button>
                    <button class="btn btn-add" style="background:var(--danger)" onclick="saveTransaction('out')">ចំណាយ</button>
                </div>
            </div>
            <div id="finance-list"></div>
        </div>

        <div id="time-page" class="page">
            <div class="input-card">
                <input type="text" id="task-name" placeholder="តើអ្នកចង់ធ្វើអ្វី?">
                <button class="btn btn-add" style="background:var(--secondary)" onclick="saveTask()">បន្ថែមការងារ</button>
            </div>
            <div id="task-list"></div>
        </div>
    </main>

    </center>
    

    <nav>
        <div class="nav-item active" onclick="switchPage('finance', this)">💰 ហិរញ្ញវត្ថុ</div>
        <div class="nav-item" onclick="switchPage('time', this)">⏱️ ពេលវេលា</div>
    </nav>
</div>
<script src="script.js"></script>
</body>
</html>
