<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងកិច្ចការ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Lan Khala</h1>
                <p class="subtitle">ប្រព័ន្ធគ្រប់គ្រងកិច្ចការបានរីកចម្រើននិងងាយស្រួល</p>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="active">
                <span>កិច្ចការកំពុងធ្វើការ</span>
            </button>
            <button class="tab-btn" data-tab="history">
                <span>ប្រវត្តិ</span>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="section-header">
                    <h2>បង្កើតកិច្ចការថ្មី</h2>
                </div>
                <form class="form-group" id="taskForm">
                    <div class="form-field">
                        <label for="taskTitle">ឈ្មោះកិច្ចការ</label>
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="ឧ. ធ្វើលេខរៀងឯកសារ"
                            maxlength="100"
                        >
                    </div>
                    <div class="form-field">
                        <label for="taskDesc">ពិពណ៌នាលម្អិត</label>
                        <textarea 
                            id="taskDesc" 
                            placeholder="សរសេរលម្អិតដ៏ហ្មត់ចត់អំពីកិច្ចការរបស់អ្នក..."
                            rows="5"
                        ></textarea>
                    </div>
                    <button type="submit" class="btn-primary">បន្ថែមកិច្ចការ</button>
                </form>
            </section>

            <!-- Active Tasks -->
            <section class="task-section active-section" id="activeSection" data-section="active">
                <div class="section-header">
                    <h2>កិច្ចការកំពុងធ្វើការ</h2>
                    <span class="task-count" id="activeCount">0</span>
                </div>
                <div id="activeList" class="task-list">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>មិនមានកិច្ចការ</p>
                        <small>ចូលបង្កើតកិច្ចការថ្មីដោយបំពេញកម្រង់ដែលនៅខាងលើ</small>
                    </div>
                </div>
            </section>

            <!-- History Section -->
            <section class="task-section history-section hidden" id="historySection" data-section="history">
                <div class="section-header">
                    <h2>📜 ប្រវត្តិសាស្ត្របានបញ្ចប់</h2>
                    <span class="task-count" id="historyCount">0</span>
                </div>
                <div id="historyList" class="task-list">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>មិនមានកិច្ចការដែលបានបញ្ចប់</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© ២ ០ ២ ៦ ប្រព័ន្ធគ្រប់គ្រងកិច្ចការ | អាកបង្កើត</p>
        </footer>
    </div>

    <!-- Modal for Editing -->
    <div class="modal hidden" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>កែសម្រួលកិច្ចការ</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form class="form-group" id="editForm">
                <div class="form-field">
                    <label for="editTitle">ឈ្មោះកិច្ចការ</label>
                    <input type="text" id="editTitle" maxlength="100">
                </div>
                <div class="form-field">
                    <label for="editDesc">ពិពណ៌នាលម្អិត</label>
                    <textarea id="editDesc" rows="5"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">💾 រក្សាទុក</button>
                    <button type="button" class="btn-secondary" id="cancelEdit">បោះបង់</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
